<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Wander Store</title>
  <link rel="stylesheet" href="surio.css">
</head>
<body>

<header>
  <h1>🛍️ Wander Store</h1>
  <p>Login to your account</p>
</header>

<nav>
  <a href="landing.html">Home</a>
  <a href="products.html">Products</a>
  <a href="cart.html">Cart</a>
  <a href="account.html">Account</a>
  <a href="login.html">Login</a>
</nav>

<main class="login-container">
  <div class="login-card">
    <h1>Login</h1>
    <p class="login-subtitle">Welcome back!</p>

    <form>
      <label>Email</label>
      <input type="email" required placeholder="your@email.com">

      <label>Password</label>
      <input type="password" required placeholder="Enter your password">

      <div class="forgot-password">
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="login-btn">Log In</button>
    </form>

    <p class="signup-link">
      Don't have an account? <a href="signup.html">Create Account</a>
    </p>
  </div>
</main>

<footer>
  <p>&copy; 2024 Wander Store. All rights reserved.</p>
</footer>

</body>
</html>
