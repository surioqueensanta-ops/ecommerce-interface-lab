<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Wander Store</title>
  <link rel="stylesheet" href="surio.css">
</head>
<body>

<header>
  <h1>🛍️ Wander Store</h1>
  <p>Create your account</p>
</header>

<nav>
  <a href="landing.html">Home</a>
  <a href="products.html">Products</a>
  <a href="login.html">Login</a>
</nav>

<main class="login-container">
  <div class="login-card">
    <h1>Create Account</h1>
    <p class="login-subtitle">Join us for a better shopping experience</p>

    <form>
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" name="fullname" required placeholder="Chamel">

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required placeholder="charmeldelaruz@example.com">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required minlength="8" placeholder="At least 8 characters">

      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" name="confirm" required placeholder="">

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="Optional">
      <p class="optional-text">We'll only use this for order updates</p>

      <button type="submit" class="login-btn">Sign Up</button>
    </form>

    <p class="signup-link">
      Already have an account? <a href="login.html">Login</a>
    </p>
  </div>
</main>

<footer>
  <p>&copy; 2024 Wander Store. All rights reserved.</p>
</footer>

</body>
</html>
