<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Wander Store</title>
  <link rel="stylesheet" href="surio.css">
</head>
<body>

<header>
  <h1>🛍️ Wander Store</h1>
  <p>Complete your purchase</p>
</header>

<nav>
  <a href="landing.html">Home</a>
  <a href="products.html">Products</a>
  <a href="cart.html">Cart</a>
  <a href="account.html">Account</a>
</nav>

<main style="display: flex; flex-wrap: wrap; gap: 30px;">
  <div style="flex: 2;">
    <h1>Checkout</h1>
    
    <form>
      <fieldset>
        <legend>📦 Shipping Address</legend>
        
        <label>Full Name:</label>
        <input type="text" required placeholder="John Doe">
        
        <label>Street Address:</label>
        <input type="text" required placeholder="123 Main St">
        
        <label>City:</label>
        <input type="text" required>
        
        <label>Zip Code:</label>
        <input type="text" required pattern="[0-9]{4,6}" placeholder="1234">
      </fieldset>

      <fieldset>
        <legend>💳 Payment Method</legend>
        
        <label><input type="radio" name="payment" value="credit" required> Credit Card</label>
        <label><input type="radio" name="payment" value="paypal"> PayPal</label>
        <label><input type="radio" name="payment" value="cod"> Cash on Delivery</label>
      </fieldset>

      <button type="submit" class="place-order-btn">Place Order</button>
    </form>
  </div>

  <aside class="order-summary" style="flex: 1; position: sticky; top: 20px; align-self: flex-start;">
    <h3>Order Summary</h3>
    <p>Items: 2</p>
    <p>Subtotal: <span class="price">1029</span></p>
    <p>Shipping: ₱50</p>
    <hr>
    <p><strong>Total: <span class="price">1079</span></strong></p>
  </aside>
</main>

<footer>
  <p>&copy; 2024 Wander Store. All rights reserved.</p>
</footer>

</body>
</html>
