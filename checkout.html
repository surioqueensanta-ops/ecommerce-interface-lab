<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Wander Store</title>
  <link rel="stylesheet" href="surio.css">
</head>
<body>

<header>
  <h1>🛍️ Wander Store</h1>
  <p>Complete your purchase</p>
</header>

<nav>
  <a href="landing.html">Home</a>
  <a href="products.html">Products</a>
  <a href="cart.html">Cart</a>
  <a href="account.html">Account</a>
  <a href="login.html">Login</a>
</nav>

<main class="checkout-container">
  <div class="checkout-form">
    <h1>Checkout</h1>
    
    <form>
      <fieldset>
        <legend>📦 Shipping Address</legend>
        
        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname" required placeholder="John Doe">
        
        <label for="street">Street Address:</label>
        <input type="text" id="street" name="street" required placeholder="123 Main St">
        
        <label for="city">City:</label>
        <input type="text" id="city" name="city" required>
        
        <label for="zip">Zip Code:</label>
        <input type="text" id="zip" name="zip" required placeholder="1234">
      </fieldset>

      <fieldset>
        <legend>💳 Payment Method</legend>
        
        <label><input type="radio" name="payment" value="credit" required> Credit Card</label>
        <label><input type="radio" name="payment" value="paypal"> PayPal</label>
        <label><input type="radio" name="payment" value="cod"> Cash on Delivery</label>
      </fieldset>

      <button type="submit" class="place-order-btn">Place Order</button>
    </form>
  </div>

  <aside class="checkout-summary">
    <h3>Order Summary</h3>
    <p>Items: 2</p>
    <p>Subtotal: <span class="price">1029</span></p>
    <p>Shipping: ₱50</p>
    <hr>
    <p><strong>Total: <span class="price">1079</span></strong></p>
  </aside>
</main>

<footer>
  <p>&copy; 2024 Wander Store. All rights reserved.</p>
</footer>

</body>
</html>
